<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" aria-label="Concurrency Scaling">
  <title>Concurrency Scaling</title>
  <style>text { font-family: system-ui, -apple-system, sans-serif; }</style>
