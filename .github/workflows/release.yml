name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Validate before releasing
      - run: pnpm lint && pnpm typecheck && pnpm test && pnpm build
      - run: pnpm benchmark:quick -- --min-detection 0.85

      # semantic-release: analyzes commits, bumps version, publishes npm,
      # creates GitHub release + tag, updates CHANGELOG.md
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
