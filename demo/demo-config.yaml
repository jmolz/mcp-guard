# MCP-Guard — minimal config
servers:
  filesystem:
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
    policy:
      permissions:
        denied_tools: ["exec_command", "write_file"]
      rate_limit:
        requests_per_minute: 60

  database:
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-sqlite", "./data.db"]
    policy:
      permissions:
        denied_tools: ["drop_table"]

pii:
  actions:
    ssn: { request: block, response: block }
    credit_card: { request: block, response: block }
    aws_key: { request: block, response: block }
    email: { request: redact, response: redact }
