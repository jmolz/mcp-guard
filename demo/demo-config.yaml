# MCP-Guard demo config — uses mock servers from benchmarks/
servers:
  database:
    transport: stdio
    command: ./node_modules/.bin/tsx
    args: ["benchmarks/mock-servers/database.ts"]
    policy:
      permissions:
        denied_tools: ["drop_table"]
      rate_limit:
        requests_per_minute: 60

pii:
  actions:
    ssn: { request: block, response: block }
    credit_card: { request: block, response: block }
    aws_key: { request: block, response: block }
    email: { request: redact, response: redact }
