    <polyline points="80,337.9016490690623 293.3333333333333,323.7300893416128 506.66666666666663,240.85922038958094 720,143.2028644220973" fill="none" stroke="#22c55e" stroke-width="2"/>
    <circle cx="80" cy="337.9016490690623" r="4" fill="#22c55e"/>
